name: 🧪 Tests & Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Cardoon

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: "Cardoon/yarn.lock"

      - name: 📦 Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: 🧪 Run frontend tests with coverage
        run: yarn test --run --coverage

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          directory: ./Cardoon/coverage
          flags: frontend-unittests
          name: cardoon-frontend-coverage
          fail_ci_if_error: false

  typecheck-frontend:
    name: 📝 Frontend TypeScript Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Cardoon

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: "Cardoon/yarn.lock"

      - name: 📦 Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: 📝 Frontend type check
        run: yarn type-check

  build-frontend:
    name: 🏗️ Frontend Build Check
    runs-on: ubuntu-latest
    needs: [test-frontend, typecheck-frontend]

    defaults:
      run:
        working-directory: ./Cardoon

    steps:
      - name: �📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: "Cardoon/yarn.lock"

      - name: 📦 Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: 🏗️ Build frontend application
        run: yarn build

      - name: 📤 Upload frontend build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: Cardoon/dist/
          retention-days: 7

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 📦 Install root dependencies
        run: yarn install

      - name: 📦 Install frontend dependencies
        run: yarn install-client

      - name: 🧪 Run frontend tests with coverage
        run: yarn test:coverage
